<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1e1e1e; color: white; padding: 30px; max-width: 900px; margin: 0 auto; }
        h1 { color: #f44336; border-bottom: 2px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .logout-btn { background: transparent; color: #aaa; text-decoration: none; font-size: 0.5em; border: 1px solid #aaa; padding: 5px 10px; border-radius: 4px; }
        .logout-btn:hover { background: #333; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #2a2a2a; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #444; }
        th { background: #333; color: #4CAF50; font-weight: bold; }
        tr:hover { background: #3a3a3a; }
        
        .role-admin { color: #f44336; font-weight: bold; }
        .role-user { color: #2196F3; font-weight: bold; }
    </style>
</head>
<body>
    <h1>
        <span>Transit Authority Admin Portal</span>
        <a href="/" class="logout-btn">Log Out &larr;</a>
    </h1>
    
    <h2>Registered Commuters</h2>
    <table>
        <thead>
            <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>Account Role</th>
            </tr>
        </thead>
        <tbody id="user-table-body">
            <tr><td colspan="3">Loading secure user data...</td></tr>
        </tbody>
    </table>

    <script>
        // Fetch the user data from the C++ backend as soon as the page loads
        fetch('/api/admin/users')
            .then(response => response.json())
            .then(users => {
                const tableBody = document.getElementById('user-table-body');
                tableBody.innerHTML = ''; // Clear the loading text
                
                users.forEach(user => {
                    // Apply different styling based on their role
                    const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
                    
                    tableBody.innerHTML += `
                        <tr>
                            <td>#${user.id.toString().padStart(4, '0')}</td>
                            <td>${user.username}</td>
                            <td class="${roleClass}">${user.role.toUpperCase()}</td>
                        </tr>
                    `;
                });
            });
    </script>
</body>
</html>
