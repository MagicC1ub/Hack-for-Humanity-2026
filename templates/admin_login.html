<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #2a2a2a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #3a3a3a; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 10px; font-size: 1.1em; width: 80%; margin-bottom: 20px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; font-size: 1.1em; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #error-msg { color: #f44336; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Authentication</h2>
        <input type="password" id="password" placeholder="Enter Admin Password" autocomplete="off">
        <br>
        <button onclick="attemptLogin()">Secure Login</button>
        <p id="error-msg">Access Denied. Incorrect Password.</p>
    </div>

    <script>
        function attemptLogin() {
            const pass = document.getElementById('password').value;
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `password=${encodeURIComponent(pass)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = '/admin_dashboard';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
