<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F4F6F9; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #ffffff; padding: 40px; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #002F6C; }
        h2 { color: #002F6C; margin-top: 0; }
        input { padding: 10px; font-size: 1.1em; width: 90%; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc; background: #fafafa; color: #333; }
        button { padding: 10px; width: 100%; font-size: 1.1em; background: #009BDF; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-register { background: #002F6C; }
        #msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Authentication</h2>
        <input type="password" id="password" placeholder="Enter Admin Password" autocomplete="off">
        <br>
        <button onclick="attemptLogin()">Secure Login</button>
        <p id="error-msg">Access Denied. Incorrect Password.</p>
    </div>

    <script>
        function attemptLogin() {
            const pass = document.getElementById('password').value;
            fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `password=${encodeURIComponent(pass)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = '/admin_dashboard';
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
