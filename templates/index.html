<!DOCTYPE html>
<html>
<head>
    <title>Transit Passport Portal</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #2a2a2a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-size: 3em; margin-bottom: 40px; color: #4CAF50; text-align: center; }
        .button-container { display: flex; gap: 20px; }
        a.button { text-decoration: none; padding: 20px 40px; font-size: 1.2em; border-radius: 8px; font-weight: bold; transition: transform 0.2s; }
        a.button:hover { transform: scale(1.05); }
        .btn-commuter { background: #2196F3; color: white; }
        .btn-admin { background: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Transit Passport Portal</h1>
    <div class="button-container">
        <a href="/commuter_login" class="button btn-commuter">Commuter Access</a>
        <a href="/admin_login" class="button btn-admin">Admin Access</a>
    </div>
</body>
</html>
