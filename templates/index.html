<!DOCTYPE html>
<html>
<head>
    <title>Transit Passport Portal</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F4F6F9; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-size: 3em; margin-bottom: 40px; color: #002F6C; text-align: center; font-weight: 800; }
        .button-container { display: flex; gap: 20px; }
        a.button { text-decoration: none; padding: 20px 40px; font-size: 1.2em; border-radius: 8px; font-weight: bold; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        a.button:hover { transform: scale(1.05); }
        .btn-commuter { background: #009BDF; color: white; }
        .btn-admin { background: #002F6C; color: white; }
    </style>
</head>
<body>
    <h1>Transit Passport Portal</h1>
    <div class="button-container">
        <a href="/commuter_login" class="button btn-commuter">Commuter Access</a>
        <a href="/admin_login" class="button btn-admin">Admin Access</a>
    </div>
</body>
</html>
