<!DOCTYPE html>
<html>
<head>
    <title>Transit Passport</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F4F6F9; color: #333; padding: 20px; max-width: 800px; margin: 0 auto;}
        h1, h2 { color: #002F6C; }
        .logout-btn { background: transparent; color: #002F6C; text-decoration: none; font-size: 0.8em; border: 1px solid #002F6C; padding: 5px 10px; border-radius: 4px; margin-left: 15px; cursor: pointer; font-weight: bold;}
        .logout-btn:hover { background: #002F6C; color: white; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 16px; cursor: pointer; background: #009BDF; color: white; border: none; border-radius: 4px; font-weight: bold; } 
        button:hover { opacity: 0.9; }
        
        .badge { background: #ffffff; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #009BDF;}
        .badge-info h3 { margin: 0 0 5px 0; color: #002F6C; }
        .badge-info p { margin: 0; color: #555; font-size: 0.9em; }
        .badge-rank { font-weight: bold; color: #009BDF; margin-top: 5px; display: inline-block;}
        .inactive-badge { opacity: 0.6; filter: grayscale(100%); border-left: 5px solid #999; }
        
        .rarity-container { width: 200px; text-align: right; }
        .rarity-bar { height: 20px; border-radius: 10px; text-align: right; padding-right: 10px; line-height: 20px; font-size: 0.8em; font-weight: bold; color: #333; border: 1px solid #ddd; }

        /* Minimized State Styles */
        #badge-container.minimized { display: flex; flex-wrap: wrap; gap: 10px; }
        #badge-container.minimized .badge { width: auto; padding: 8px 12px; }
        #badge-container.minimized .badge-info p, 
        #badge-container.minimized .badge-rank, 
        #badge-container.minimized .rarity-container,
        #badge-container.minimized h2 { display: none; }
        #badge-container.minimized h3 { font-size: 1em; margin: 0; }
    </style>
</head>
<body>
    <div class="header-controls">
        <div style="display: flex; align-items: center;">
            <h1>My Transit Passport</h1>
            <button onclick="logout()" class="logout-btn">Log Out &larr;</button>
        </div>
        <button onclick="toggleView()">Toggle Compact View</button>
        <button onclick="simulateTime()" style="background: #f44336;">Simulate 1 Week Pass</button>
        <button onclick="swipeCard()" style="background: #2196F3; font-size: 1.1em; padding: 10px 20px;">Log New Transit Trip</button>
    </div>
    
    <div id="badge-container">Loading...</div>

    <script>
        function logout() {
            localStorage.removeItem('transit_user_id'); 
            window.location.href = '/'; // Sends them back to the main portal
        }

        // 1. Security Check: Kick them to login if no ID is saved
        const userId = localStorage.getItem('transit_user_id');
        if (!userId) {
            window.location.href = '/commuter_login';
        }

        function toggleView() {
            document.getElementById('badge-container').classList.toggle('minimized');
        }

        // 2. Fetch badges for THIS specific user
        fetch(`/api/badges?user_id=${userId}`)
            .then(response => response.json())
            .then(data => {
                const typeOrder = { 'temporary': 1, 'upgradable': 2, 'one_and_done': 3 };
                data.sort((a, b) => {
                    if (typeOrder[a.type] !== typeOrder[b.type]) {
                        return typeOrder[a.type] - typeOrder[b.type];
                    }
                    return a.rarity - b.rarity;
                });
                
                const container = document.getElementById('badge-container');
                container.innerHTML = '';
                let currentType = '';

                data.forEach(badge => {
                    if (badge.type !== currentType) {
                        const typeTitle = badge.type.replace(/_/g, ' ').toUpperCase();
                        container.innerHTML += `<h2>${typeTitle}</h2>`;
                        currentType = badge.type;
                    }

                    let actionButton = '';
                    let progressHtml = '';
                    let titleColor = '#002F6C'; // VTA Navy Blue
                    
                    if (badge.type === 'upgradable') {
                        actionButton = `<button onclick="logTrip('${badge.id}')" style="margin-top: 10px; background: #009BDF; border: none; padding: 5px 10px; border-radius: 4px; color: white; cursor: pointer; font-weight: bold;">+ Simulate Trip</button>`;
                        
                        // Set the titleColor based on rank (Keep your existing Bronze/Silver/Gold logic here!)
                        if (badge.rank === 'Wood') titleColor = '#CD853F';       
                        else if (badge.rank === 'Bronze') titleColor = '#CD7F32'; 
                        else if (badge.rank === 'Silver') titleColor = '#888888'; // Darkened silver for light mode
                        else if (badge.rank === 'Gold') titleColor = '#DAA520';   // Darkened gold for light mode
                        
                        progressHtml = `<p style="color: ${titleColor}; font-weight: bold; margin-top: 5px; font-size: 0.9em;">${badge.progress_text}</p>`;
                        
                    } else if (badge.type === 'temporary') {
                        // Change temporary progress text to VTA Light Blue
                        progressHtml = `<p style="color: #009BDF; font-weight: bold; margin-top: 5px; font-size: 0.9em;">${badge.progress_text}</p>`;
                    }

                    // Reverse the rarity bar colors for light mode (Blue fills the percentage, light gray is the empty space)
                    const barStyle = `background: linear-gradient(to right, #009BDF ${badge.rarity}%, #e0e0e0 ${badge.rarity}%); color: ${badge.rarity > 50 ? 'white' : '#333'};`;
                    const activeClass = badge.rank === 'Inactive' ? 'inactive-badge' : '';

                    container.innerHTML += `
                        <div class="badge ${activeClass}">
                            <div class="badge-info">
                                <h3 style="color: ${titleColor};">${badge.name}</h3>
                                <p>${badge.description}</p>
                                <span class="badge-rank" style="color: ${titleColor}; font-weight: bold;">Rank: ${badge.rank}</span>
                                ${progressHtml}
                                <br>
                                ${actionButton}
                            </div>
                            <div class="rarity-container">
                                <div class="rarity-bar" style="${barStyle}">${badge.rarity.toFixed(1)}%</div>
                            </div>
                        </div>
                    `;
                });
            });

        // 3. Update all POST requests to include the user_id in the body
        function logTrip(badgeId) {
            fetch('/api/log_trip', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `id=${badgeId}&user_id=${userId}`
            })
            .then(() => location.reload());
        }

        function swipeCard() {
            fetch('/api/swipe_card', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `user_id=${userId}`
            })
            .then(() => location.reload());
        }

        function simulateTime() {
            fetch('/api/simulate_time', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `user_id=${userId}`
            })
            .then(() => location.reload());
        }
    </script>
</body>
</html>
